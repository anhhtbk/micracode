name: Web quality checks (lint + typecheck)

# Lint and typecheck used to be gated by `next build` inside the Docker
# image. We disabled `eslint.ignoreDuringBuilds` in next.config.ts to keep
# image builds focused on compilation, so this workflow restores the gate
# at the repo level — runs on every push/PR that touches the web app or
# shared package.

on:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - "packages/shared/**"
      - "package.json"
      - "bun.lock*"
      - "bunfig.toml"
      - ".github/workflows/web-quality.yml"
  pull_request:
    paths:
      - "apps/web/**"
      - "packages/shared/**"
      - "package.json"
      - "bun.lock*"
      - "bunfig.toml"
      - ".github/workflows/web-quality.yml"
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install workspace deps
        run: bun install --frozen-lockfile || bun install

      - name: Lint web
        run: bun --filter web lint

      - name: Typecheck web + shared
        run: bun --filter web typecheck && bun --filter '@micracode/shared' typecheck
