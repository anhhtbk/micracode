services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: ghcr.io/${GITHUB_OWNER:-your-github-username}/micracode-api:${TAG:-latest}
    # Always try to pull the GHCR image on `up`. To build locally instead,
    # run `docker compose build api && docker compose up --pull never -d api`.
    pull_policy: always
    container_name: micracode-api
    restart: unless-stopped
    env_file:
      # Optional so pull-only users (consuming GHCR image) can start the
      # stack before creating the file. The API will fall back to its own
      # defaults / runtime errors if required keys are missing.
      - path: ./apps/api/.env
        required: false
    environment:
      OPENER_APPS_DIR: /app/data
    # No `ports:` — API is reachable only via the docker network. The
    # web service proxies /api/* to http://api:8000 server-side via
    # Next.js rewrites, so the API never has to be exposed publicly.
    # To debug from the host, run: `docker compose exec api curl …`
    # or temporarily uncomment the block below.
    # ports:
    #   - "8000:8000"
    volumes:
      - api-data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/v1/health').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      # Standalone (default) produces a slim runtime image; switch to
      # `runner-full` to fall back to copying full node_modules.
      target: ${WEB_BUILD_TARGET:-runner-standalone}
      args:
        NEXT_STANDALONE: ${NEXT_STANDALONE:-true}
        # Defaults to "/api" so the client bundle uses same-origin
        # requests; Next.js then rewrites them to `INTERNAL_API_URL`
        # server-side. Override only if you intentionally want the
        # browser to hit the API directly (e.g. exposing api.* publicly).
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-/api}
        # Next.js bakes rewrite destinations at build time, so this
        # must be a build arg (not just a runtime env). `api` is the
        # docker compose service name.
        INTERNAL_API_URL: ${INTERNAL_API_URL:-http://api:8000}
    image: ghcr.io/${GITHUB_OWNER:-your-github-username}/micracode-web:${TAG:-latest}
    # Always try to pull the GHCR image on `up`. To build locally instead,
    # run `docker compose build web && docker compose up --pull never -d web`.
    pull_policy: always
    container_name: micracode-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      # Server-only: where Next.js forwards /api/* requests inside the
      # docker network. `api` resolves to the api service via docker DNS.
      INTERNAL_API_URL: http://api:8000
    ports:
      - "3000:3000"
    depends_on:
      - api

  # Cloudflare Tunnel: expose web (and optionally api) through a Cloudflare
  # domain without opening any public port. Tunnel routes are configured in
  # the Cloudflare Zero Trust dashboard (Networks → Tunnels) — no config
  # file required here.
  #
  # Token setup:
  #   1. https://one.dash.cloudflare.com → Networks → Tunnels → Create a tunnel
  #   2. Pick the "Cloudflared" connector, give the tunnel a name
  #   3. Copy the token (long string starting with `eyJ...`) into .env as
  #      CLOUDFLARE_TUNNEL_TOKEN=...
  #   4. Public hostnames: map subdomain → service (e.g. app.example.com →
  #      http://web:3000, api.example.com → http://api:8000). Use the
  #      compose service name as host because they share the same network.
  cloudflared:
    # Optional service. Enable with: `docker compose --profile tunnel up`.
    profiles: ["tunnel"]
    image: cloudflare/cloudflared:latest
    container_name: micracode-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      # Empty default so compose can parse the file when the tunnel profile
      # is not active. When the service IS started via `--profile tunnel`,
      # cloudflared itself will refuse to run with an empty token.
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:-}
    depends_on:
      - web
      - api

volumes:
  api-data:
