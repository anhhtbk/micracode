name: Build & Publish Docker images to GHCR

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: web
            dockerfile: apps/web/Dockerfile
            image: micracode-web
            # NEXT_PUBLIC_* vars are inlined into the client bundle at build
            # time, so the public API origin must be provided here. Configure
            # `NEXT_PUBLIC_API_BASE_URL` in repo settings → Variables.
            build-args: |
              NEXT_PUBLIC_API_BASE_URL=${{ vars.NEXT_PUBLIC_API_BASE_URL }}
          - name: api
            dockerfile: apps/api/Dockerfile
            image: micracode-api
            build-args: ""

    steps:
      - uses: actions/checkout@v4

      # Fail fast if the web image would be built without a public API origin.
      # NEXT_PUBLIC_* is inlined into the client bundle at build time, so an
      # empty value silently ships a broken `latest` image.
      - name: Validate web build vars
        if: matrix.name == 'web'
        env:
          NEXT_PUBLIC_API_BASE_URL: ${{ vars.NEXT_PUBLIC_API_BASE_URL }}
        run: |
          if [ -z "${NEXT_PUBLIC_API_BASE_URL}" ]; then
            echo "::error::Repository variable NEXT_PUBLIC_API_BASE_URL is not set." \
                 "Configure it in Settings → Secrets and variables → Actions → Variables" \
                 "(e.g. https://api.example.com). Aborting to avoid publishing a broken web image."
            exit 1
          fi

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ matrix.build-args }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
          platforms: linux/amd64
